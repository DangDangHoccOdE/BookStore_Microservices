spring.application.name=user-service
server.port=8084
server.shutdown=graceful

######## Actuator Configuration  #########
management.info.git.mode=full
management.endpoints.web.exposure.include=*

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:45432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9191/realms/bookstore}

security.jwt.required-audience=${JWT_REQUIRED_AUDIENCE:user-service-client}

users.keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:9191}
users.keycloak.realm=${KEYCLOAK_REALM:bookstore}
users.keycloak.client-id=${KEYCLOAK_CLIENT_ID:user-service-client}
users.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:Su2ewBLfHmdmvFRE5qRruSu68oCgRHED}
users.keycloak.default-role=USER

users.events-exchange=users-exchange

# Resilience4j configuration
resilience4j.retry.instances.keycloak.max-attempts=3
resilience4j.retry.instances.keycloak.wait-duration=1s
resilience4j.retry.instances.keycloak.retry-exceptions=jakarta.ws.rs.ProcessingException,java.net.SocketTimeoutException
resilience4j.retry.instances.keycloak.ignore-exceptions=com.bookstore.user.web.exception.KeycloakUserAlreadyExistsException
