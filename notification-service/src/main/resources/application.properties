spring.application.name=notification-service

server.port=8083
server.shutdown=graceful
server.tomcat.threads.max=50

######## Actuator Configuration  #########
management.info.git.mode=full
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=false
management.tracing.sampling.probability=1.0

######## Database Configuration  #########
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:35432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
#spring.jpa.hibernate.ddl-auto=update

######## RabbitMQ Configuration  #########
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

######## Notification Service Configuration  #########
notifications.order-events-exchange=orders-exchange
notifications.new-orders-queue=new-orders
notifications.delivered-orders-queue=delivered-orders
notifications.cancelled-orders-queue=cancelled-orders
notifications.error-orders-queue=error-orders
notifications.support-email=haidang30997@gmail.com

######## DLQ Configuration  #########
notifications.dead-letter-exchange=orders-dlx
notifications.new-orders-queue-retry=new-orders-retry
notifications.new-orders-queue-dlq=new-orders-dlq
notifications.delivered-queue-retry=delivered-orders-retry
notifications.delivered-queue-dlq=delivered-orders-dlq
notifications.cancelled-queue-retry=cancelled-orders-retry
notifications.cancelled-queue-dlq=cancelled-orders-dlq
notifications.error-queue-retry=error-orders-retry
notifications.error-queue-dlq=error-orders-dlq
notifications.retry-ttl=10000

############# Mail Properties ###########
spring.mail.host=${MAIL_HOST:127.0.0.1}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:PLACEHOLDER}
spring.mail.password=${MAIL_PASSWORD:PLACEHOLDER}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

######### RabbitMQ Listener Configuration  #########
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=10

logging.pattern.level="%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"