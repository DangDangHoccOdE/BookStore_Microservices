spring.application.name=catalog-service
server.port=8081

server.shutdown=graceful
management.endpoints.web.exposure.include=health,info,prometheus


######## Database Configuration  #########
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:15432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.open-in-view=false

# Oauth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9191/realms/bookstore}
security.jwt.required-audience=${JWT_REQUIRED_AUDIENCE:catalog-service-api}

# Api Gateway URL for Swagger UI
swagger.api-gateway-url=${API_GATEWAY_URL:http://localhost:8989/catalog}

# Catalog Service Configuration
services.catalog-service-url=${CATALOG_SERVICE_URL:http://localhost:8989/catalog}
services.page-size=10
### user-service-admin is only used for backend to call Keycloak admin API, its has on resource_access to get roles
services.keycloak.client-id=${KEYCLOAK_API_CLIENT_ID:user-service-admin}

# Swagger UI OAuth2 configuration
#springdoc.swagger-ui.oauth.client-id=${SWAGGER_CLIENT_ID:catalog-service-api}
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true